components:
  schemas:
    AdminUser:
      type: object
      required:
        - adminUserId
        - name
        - email
        - createdAt
        - role
        - permissions
      properties:
        adminUserId:
          $ref: '#/components/schemas/adminUserId'
        name:
          $ref: '#/components/schemas/adminUserName'
        email:
          $ref: '#/components/schemas/email'
        createdAt:
          $ref: '#/components/schemas/createdAt'
        role:
          $ref: '#/components/schemas/Role'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
      examples:
        - adminUserId: 0cc5f492-22fe-4f38-b702-8b2375bc0254
          name: 管理ユーザー名
          email: example@example.com
          createdAt: '2019-12-09T10:30:20+09:00'
          role:
            name: 一般
            value: 3
          permissions:
            - name: 管理ユーザー読み取り
              value: read_admin_user
    AdminUserListResponse:
      type: object
      required:
        - adminUsers
      properties:
        adminUsers:
          type: array
          items:
            $ref: '#/components/schemas/AdminUser'
    Arranger:
      type: object
      allOf:
        - $ref: '#/components/schemas/SongCreator'
      examples:
        - creatorId: a4d01e9d-e593-4bd9-ba83-e9a7dd3887cd
          name: ヰ世界情緒
          orderNo: 1
    Composer:
      type: object
      allOf:
        - $ref: '#/components/schemas/SongCreator'
      examples:
        - creatorId: a4d01e9d-e593-4bd9-ba83-e9a7dd3887cd
          name: ヰ世界情緒
          orderNo: 1
    Creator:
      type: object
      required:
        - creatorId
        - name
        - orderNo
      properties:
        creatorId:
          $ref: '#/components/schemas/creatorId'
        name:
          $ref: '#/components/schemas/creatorName'
        orderNo:
          $ref: '#/components/schemas/orderNo'
      examples:
        - creatorId: 0cc5f492-22fe-4f38-b702-8b2375bc0254
          name: ヰ世界情緒
          orderNo: 10
    CreatorCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          $ref: '#/components/schemas/creatorName'
    CreatorCreateResponse:
      type: object
      required:
        - creator
      properties:
        creator:
          $ref: '#/components/schemas/Creator'
    CreatorGetResponse:
      type: object
      required:
        - creator
      properties:
        creator:
          $ref: '#/components/schemas/Creator'
    CreatorListResponse:
      type: object
      required:
        - creators
      properties:
        creators:
          type: array
          items:
            $ref: '#/components/schemas/Creator'
    CreatorSearchResponse:
      type: object
      required:
        - creators
        - maxPage
      properties:
