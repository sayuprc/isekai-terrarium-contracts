[tools]
bun = "1.3.9"

[tasks.install]
description = "パッケージをインストールする"
run = "bun install"

[tasks."format:check"]
description = "フォーマットチェックをする"
run = "bun run format:check"

[tasks."format:fix"]
description = "フォーマット修正をする"
run = "bun run format:fix"

[tasks.compile]
description = "tsp から oas を生成する"
run = "bun run compile"

[tasks."compile:watch"]
description = "tsp から oas を生成する(watch オプション付き)"
run = "bun run compile:watch"

[tasks.re-compile]
description = "tsp から oas を生成し直す"
run = '''
rm -rf generated/oas
bun run compile
'''

